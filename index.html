<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gil Industries Digital Management Intelligence</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #081c2b;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.app-frame {
    position: relative;
    width: 100vw;
    aspect-ratio: 1745 / 800;
    max-height: 100vh;
    max-width: calc(100vh * 1745 / 800);
    overflow: hidden;
}

.fondo-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    z-index: 0;
}

.grafana-link {
    position: absolute;
    top: 80%;
    left: 73%;
    width: min(12vw, 180px);
    transform: translate(-50%, -50%);
    z-index: 9;
    transition: 0.22s;
}

.grafana-link:hover {
    transform: translate(-50%, -50%) scale(1.08);
    filter: drop-shadow(0 0 10px rgba(0,240,255,.28))
            drop-shadow(0 0 22px rgba(0,240,255,.18));
}

.powerbi-link {
    position: absolute;
    top: 50%;
    left: 82%;
    width: min(22vw, 320px);
    transform: translate(-50%, -50%);
    z-index: 9;
    transition: 0.22s;
}

.powerbi-link:hover {
    transform: translate(-50%, -50%) scale(1.08);
    filter: drop-shadow(0 0 10px rgba(0,240,255,.28))
            drop-shadow(0 0 22px rgba(0,240,255,.18));
}

.cursor-beam-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 8;
}

.cursor-beam-coreline {
    stroke: url(#cursorBeamGradientCore);
    stroke-width: 4.5;
    stroke-linecap: round;
    filter: url(#cursorBeamGlowStrong);
    opacity: 0;
}

.cursor-beam-hit {
    fill: rgba(170,250,255,.95);
    filter: url(#cursorBeamGlowStrong);
    opacity: 0;
}

.cursor-beam-ring {
    fill: none;
    stroke: rgba(0,240,255,.65);
    stroke-width: 1.4;
    filter: url(#cursorBeamGlow);
    opacity: 0;
}

.beam-active .cursor-beam-coreline,
.beam-active .cursor-beam-hit,
.beam-active .cursor-beam-ring {
    opacity: 1;
}
</style>
</head>

<body>

<div class="app-frame" id="appFrame">

    <img src="assets/img/HomePageBackground.svg" class="fondo-svg">

    <a class="grafana-link" href="pages/grafana/">
        <img src="assets/img/GIDMIGrafana.svg">
    </a>

    <a class="powerbi-link" href="http://10.88.90.86/pages/powerbi/">
        <img src="assets/img/GIDMIPowerBI.svg">
    </a>

    <svg class="cursor-beam-layer" id="cursorBeamLayer">

        <defs>
            <filter id="cursorBeamGlow">
                <feGaussianBlur stdDeviation="4"/>
                <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <filter id="cursorBeamGlowStrong">
                <feGaussianBlur stdDeviation="7"/>
                <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <linearGradient id="cursorBeamGradientCore">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="transparent"/>
            </linearGradient>
        </defs>

        <line id="cursorBeamCoreLine" class="cursor-beam-coreline"/>

        <circle id="cursorBeamHit" class="cursor-beam-hit" r="4.5"/>
        <circle id="cursorBeamRing" class="cursor-beam-ring" r="10"/>

    </svg>

</div>

<script>
(function () {

    function getCenter() {
        const frame = document.getElementById("appFrame");

        return {
            cx: frame.clientWidth / 2,
            cy: frame.clientHeight / 2
        };
    }

    function setupBeam() {

        const frame = document.getElementById("appFrame");
        const beamLayer = document.getElementById("cursorBeamLayer");
        const line = document.getElementById("cursorBeamCoreLine");
        const hit = document.getElementById("cursorBeamHit");
        const ring = document.getElementById("cursorBeamRing");

        function hideBeam() {
            beamLayer.classList.remove("beam-active");
        }

        function showBeam() {
            beamLayer.classList.add("beam-active");
        }

        function updateBeam(e) {

            const rect = frame.getBoundingClientRect();
            const { cx, cy } = getCenter();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            line.setAttribute("x1", cx);
            line.setAttribute("y1", cy);
            line.setAttribute("x2", x);
            line.setAttribute("y2", y);

            hit.setAttribute("cx", x);
            hit.setAttribute("cy", y);

            ring.setAttribute("cx", x);
            ring.setAttribute("cy", y);

            showBeam();
        }

        frame.addEventListener("mousemove", updateBeam);
        frame.addEventListener("mouseenter", updateBeam);
        frame.addEventListener("mouseleave", hideBeam);
        window.addEventListener("blur", hideBeam);
    }

    setupBeam();

})();
</script>

</body>
</html>
