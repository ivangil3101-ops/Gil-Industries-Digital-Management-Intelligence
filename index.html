<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gil Industries Digital Management Intelligence</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #081c2b;
    }

    body {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .app-frame {
        position: relative;
        width: 100vw;
        aspect-ratio: 1745 / 800;
        max-height: 100vh;
        max-width: calc(100vh * 1745 / 800);
        overflow: hidden;
        flex-shrink: 0;
    }

    .fondo-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        pointer-events: none;
        user-select: none;
        z-index: 0;
    }

    .grafana-link {
        position: absolute;
        top: 80%;
        left: 73%;
        width: min(12vw, 180px);
        transform: translate(-50%, -50%) scale(1);
        transform-origin: center center;
        z-index: 9;
        display: block;
        pointer-events: auto;
        transition: transform 0.22s ease, filter 0.22s ease, opacity 0.22s ease;
        opacity: 0.96;
    }

    .grafana-link:hover {
        transform: translate(-50%, -50%) scale(1.08);
        filter:
            drop-shadow(0 0 10px rgba(0, 240, 255, 0.28))
            drop-shadow(0 0 22px rgba(0, 240, 255, 0.18));
        opacity: 1;
    }

    .grafana-link img {
        width: 100%;
        height: auto;
        display: block;
        user-select: none;
        pointer-events: none;
    }

    .powerbi-link {
        position: absolute;
        top: 50%;
        left: 82%;
        width: min(22vw, 320px);
        transform: translate(-50%, -50%) scale(1);
        transform-origin: center center;
        z-index: 9;
        display: block;
        pointer-events: auto;
        transition: transform 0.22s ease, filter 0.22s ease, opacity 0.22s ease;
        opacity: 0.96;
    }

    .powerbi-link:hover {
        transform: translate(-50%, -50%) scale(1.08);
        filter:
            drop-shadow(0 0 10px rgba(0, 240, 255, 0.28))
            drop-shadow(0 0 22px rgba(0, 240, 255, 0.18));
        opacity: 1;
    }

    .powerbi-link img {
        width: 100%;
        height: auto;
        display: block;
        user-select: none;
        pointer-events: none;
    }

    .cursor-beam-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 6;
        pointer-events: none;
        overflow: visible;
    }

    .cursor-beam-coreline {
        stroke: url(#cursorBeamGradientCore);
        stroke-width: 4.2;
        stroke-linecap: round;
        filter: url(#cursorBeamGlowStrong);
        opacity: 0;
        transition: opacity 0.12s ease;
        animation: beamPulseCore 1.1s ease-in-out infinite;
    }

    .cursor-beam-hit {
        fill: rgba(170, 250, 255, 0.95);
        filter: url(#cursorBeamGlowStrong);
        opacity: 0;
        transition: opacity 0.12s ease;
        animation: beamBlink 1.2s ease-in-out infinite;
    }

    .cursor-beam-ring {
        fill: none;
        stroke: rgba(0, 240, 255, 0.65);
        stroke-width: 1.4;
        filter: url(#cursorBeamGlow);
        opacity: 0;
        transition: opacity 0.12s ease;
        animation: beamBlink 1.2s ease-in-out infinite;
    }

    .beam-active .cursor-beam-coreline,
    .beam-active .cursor-beam-hit,
    .beam-active .cursor-beam-ring {
        opacity: 1;
    }

    @keyframes beamPulseCore {
        0%, 100% { stroke-width: 4.2; opacity: 0.82; }
        50% { stroke-width: 5.6; opacity: 1; }
    }

    @keyframes beamBlink {
        0%, 100% { opacity: 0.72; }
        50% { opacity: 1; }
    }

    .data-trails {
        position: absolute;
        inset: 0;
        z-index: 7;
        pointer-events: none;
        overflow: hidden;
    }

    .data-trail {
        position: absolute;
        border-radius: 999px;
        opacity: 0;
        will-change: transform, opacity;
        transform-origin: center center;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        animation-duration: 1.11s;
        --trail-start-gap: 333px;
    }

    .data-trail.horizontal {
        width: 220px;
        height: 2px;
        background: linear-gradient(
            90deg,
            rgba(0, 240, 255, 0) 0%,
            rgba(0, 240, 255, 0.20) 18%,
            rgba(120, 250, 255, 0.98) 55%,
            rgba(255, 255, 255, 0.98) 72%,
            rgba(0, 240, 255, 0) 100%
        );
        box-shadow:
            0 0 6px rgba(0, 240, 255, 0.45),
            0 0 14px rgba(0, 240, 255, 0.28),
            0 0 22px rgba(255, 255, 255, 0.10);
    }

    .data-trail.horizontal::after {
        content: "";
        position: absolute;
        right: 18px;
        top: 50%;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.95);
        box-shadow:
            0 0 8px rgba(255, 255, 255, 0.95),
            0 0 16px rgba(0, 240, 255, 0.65);
    }

    .anim-out-right { animation-name: outRight; }
    .anim-out-left { animation-name: outLeft; }
    .anim-in-left { animation-name: inLeft; }
    .anim-in-right { animation-name: inRight; }

    @keyframes outRight {
        0% { opacity: 0; transform: translateX(var(--trail-start-gap)) scaleX(0.55); }
        10% { opacity: 0.95; }
        70% { opacity: 0.82; }
        100% { opacity: 0; transform: translateX(42vw) scaleX(1.10); }
    }

    @keyframes outLeft {
        0% { opacity: 0; transform: translateX(calc(var(--trail-start-gap) * -1)) scaleX(0.55) rotate(180deg); }
        10% { opacity: 0.95; }
        70% { opacity: 0.82; }
        100% { opacity: 0; transform: translateX(-42vw) scaleX(1.10) rotate(180deg); }
    }

    @keyframes inLeft {
        0% { opacity: 0; transform: translateX(-42vw) scaleX(1.10); }
        25% { opacity: 0.82; }
        70% { opacity: 0.95; }
        100% { opacity: 0; transform: translateX(calc(var(--trail-start-gap) * -1)) scaleX(0.55); }
    }

    @keyframes inRight {
        0% { opacity: 0; transform: translateX(42vw) scaleX(1.10) rotate(180deg); }
        25% { opacity: 0.82; }
        70% { opacity: 0.95; }
        100% { opacity: 0; transform: translateX(var(--trail-start-gap)) scaleX(0.55) rotate(180deg); }
    }
</style>
</head>

<body>

<div class="app-frame" id="appFrame">

    <img src="assets/img/HomePageBackground.svg" alt="Fondo" class="fondo-svg">

    <a class="grafana-link" href="pages/grafana/" target="_self">
        <img src="assets/img/GIDMIGrafana.svg" alt="Grafana">
    </a>

    <a class="powerbi-link" href="http://10.88.90.86/pages/powerbi/" target="_self">
        <img src="assets/img/GIDMIPowerBI.svg" alt="Power BI">
    </a>

    <svg class="cursor-beam-layer" id="cursorBeamLayer">
        <defs>
            <filter id="cursorBeamGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="4.5"/>
            </filter>

            <filter id="cursorBeamGlowStrong" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="7"/>
            </filter>

            <linearGradient id="cursorBeamGradientCore">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="55%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="transparent"/>
            </linearGradient>
        </defs>

        <line id="cursorBeamCoreLine" class="cursor-beam-coreline"/>
        <circle id="cursorBeamHit" class="cursor-beam-hit" r="4.5"/>
        <circle id="cursorBeamRing" class="cursor-beam-ring" r="10"/>
    </svg>

    <div class="data-trails">
        <div class="data-trail horizontal anim-out-right" id="trail1"></div>
        <div class="data-trail horizontal anim-in-left" id="trail2"></div>
        <div class="data-trail horizontal anim-out-right" id="trail3"></div>
        <div class="data-trail horizontal anim-in-left" id="trail4"></div>
        <div class="data-trail horizontal anim-out-right" id="trail5"></div>

        <div class="data-trail horizontal anim-out-left" id="trail6"></div>
        <div class="data-trail horizontal anim-in-right" id="trail7"></div>
        <div class="data-trail horizontal anim-out-left" id="trail8"></div>
        <div class="data-trail horizontal anim-in-right" id="trail9"></div>
        <div class="data-trail horizontal anim-out-left" id="trail10"></div>
    </div>

</div>

<script>
(function () {
    const DURATIONS = ["1.11s", "3.33s"];

    function getCenterMetrics() {
        const frame = document.getElementById("appFrame");
        return {
            cx: frame.clientWidth / 2,
            cy: frame.clientHeight / 2
        };
    }

    function placeTrails() {
        const { cx, cy } = getCenterMetrics();
        const offsets = [-48, -24, 0, 24, 48];
        const baseX = cx - 110;

        offsets.forEach((offset, i) => {
            const el = document.getElementById(`trail${i + 1}`);
            if (el) {
                el.style.left = `${baseX}px`;
                el.style.top = `${cy + offset}px`;
            }
        });

        offsets.forEach((offset, i) => {
            const el = document.getElementById(`trail${i + 6}`);
            if (el) {
                el.style.left = `${baseX}px`;
                el.style.top = `${cy + offset}px`;
            }
        });
    }

    function setupCursorBeam() {
        const frame = document.getElementById("appFrame");
        const beam = document.getElementById("cursorBeamCoreLine");
        const hit = document.getElementById("cursorBeamHit");
        const ring = document.getElementById("cursorBeamRing");
        const layer = document.getElementById("cursorBeamLayer");

        function update(e) {
            const rect = frame.getBoundingClientRect();
            const { cx, cy } = getCenterMetrics();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            beam.setAttribute("x1", cx);
            beam.setAttribute("y1", cy);
            beam.setAttribute("x2", x);
            beam.setAttribute("y2", y);

            hit.setAttribute("cx", x);
            hit.setAttribute("cy", y);
            ring.setAttribute("cx", x);
            ring.setAttribute("cy", y);

            layer.classList.add("beam-active");
        }

        frame.addEventListener("mousemove", update);
        frame.addEventListener("mouseenter", update);
        frame.addEventListener("mouseleave", () => layer.classList.remove("beam-active"));
    }

    window.addEventListener("load", placeTrails);
    window.addEventListener("resize", placeTrails);

    setupCursorBeam();
})();
</script>

</body>
</html>
