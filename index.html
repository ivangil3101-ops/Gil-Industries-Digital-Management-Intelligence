<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gil Industries Digital Management Intelligence</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #081c2b;
}

body {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.app-frame {
    position: relative;
    width: 100vw;
    aspect-ratio: 1745 / 800;
    max-height: 100vh;
    max-width: calc(100vh * 1745 / 800);
    overflow: hidden;
}

.fondo-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    z-index: 0;
}

.grafana-link {
    position: absolute;
    top: 80%;
    left: 73%;
    width: min(12vw, 180px);
    transform: translate(-50%, -50%);
    z-index: 9;
    transition: 0.22s;
}

.grafana-link:hover {
    transform: translate(-50%, -50%) scale(1.08);
    filter: drop-shadow(0 0 10px rgba(0,240,255,.28))
            drop-shadow(0 0 22px rgba(0,240,255,.18));
}

.powerbi-link {
    position: absolute;
    top: 50%;
    left: 82%;
    width: min(22vw, 320px);
    transform: translate(-50%, -50%);
    z-index: 9;
    transition: 0.22s;
}

.powerbi-link:hover {
    transform: translate(-50%, -50%) scale(1.08);
    filter: drop-shadow(0 0 10px rgba(0,240,255,.28))
            drop-shadow(0 0 22px rgba(0,240,255,.18));
}

.cursor-beam-layer {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
}

.cursor-beam-coreline {
    stroke: url(#cursorBeamGradientCore);
    stroke-width: 4.2;
    stroke-linecap: round;
    filter: url(#cursorBeamGlowStrong);
    opacity: 0;
}

.cursor-beam-side {
    stroke: url(#cursorBeamGradientSide);
    stroke-width: 1.8;
    stroke-linecap: round;
    filter: url(#cursorBeamGlow);
    opacity: 0;
}

.cursor-beam-core,
.cursor-beam-hit,
.cursor-beam-ring {
    opacity: 0;
}

.beam-active * {
    opacity: 1;
}
</style>
</head>

<body>

<div class="app-frame" id="appFrame">

    <img src="assets/img/HomePageBackground.svg" class="fondo-svg">

    <a class="grafana-link" href="pages/grafana/">
        <img src="assets/img/TCCGrafana.svg">
    </a>

    <a class="powerbi-link" href="http://10.88.90.86/pages/powerbi/">
        <img src="assets/img/TCCPowerBI.svg">
    </a>

    <svg class="cursor-beam-layer" id="cursorBeamLayer">

        <defs>
            <filter id="cursorBeamGlow">
                <feGaussianBlur stdDeviation="4"/>
                <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <filter id="cursorBeamGlowStrong">
                <feGaussianBlur stdDeviation="7"/>
                <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <linearGradient id="cursorBeamGradientCore">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="50%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="transparent"/>
            </linearGradient>

            <linearGradient id="cursorBeamGradientSide">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="70%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="transparent"/>
            </linearGradient>
        </defs>

        <line id="cursorBeamLeft" class="cursor-beam-side"/>
        <line id="cursorBeamCoreLine" class="cursor-beam-coreline"/>
        <line id="cursorBeamRight" class="cursor-beam-side"/>

        <circle id="cursorBeamCore" r="6" fill="#fff"/>
        <circle id="cursorBeamHit" r="4.5" fill="#aafaff"/>
        <circle id="cursorBeamRing" r="10" stroke="#00f0ff" fill="none"/>

    </svg>

</div>

<script>
(function () {

    function getCenter() {
        const frame = document.getElementById("appFrame");
        return {
            cx: frame.clientWidth / 2,
            cy: frame.clientHeight / 2
        };
    }

    function setupBeam() {

        const frame = document.getElementById("appFrame");

        const left = document.getElementById("cursorBeamLeft");
        const core = document.getElementById("cursorBeamCoreLine");
        const right = document.getElementById("cursorBeamRight");

        const dot = document.getElementById("cursorBeamCore");
        const hit = document.getElementById("cursorBeamHit");
        const ring = document.getElementById("cursorBeamRing");

        const layer = document.getElementById("cursorBeamLayer");

        function setLine(el,x1,y1,x2,y2){
            el.setAttribute("x1",x1);
            el.setAttribute("y1",y1);
            el.setAttribute("x2",x2);
            el.setAttribute("y2",y2);
        }

        frame.addEventListener("mousemove", e => {

            const rect = frame.getBoundingClientRect();
            const {cx,cy} = getCenter();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const dx = x - cx;
            const dy = y - cy;

            const len = Math.hypot(dx,dy) || 1;

            const nx = -dy / len;
            const ny = dx / len;

            const offset = 4.5;

            setLine(left, cx+nx*offset, cy+ny*offset, x+nx*offset, y+ny*offset);
            setLine(core, cx, cy, x, y);
            setLine(right, cx-nx*offset, cy-ny*offset, x-nx*offset, y-ny*offset);

            dot.setAttribute("cx",cx);
            dot.setAttribute("cy",cy);

            hit.setAttribute("cx",x);
            hit.setAttribute("cy",y);

            ring.setAttribute("cx",x);
            ring.setAttribute("cy",y);

            layer.classList.add("beam-active");

        });

        frame.addEventListener("mouseleave", ()=> {
            layer.classList.remove("beam-active");
        });

    }

    setupBeam();

})();
</script>

</body>
</html>
